<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACN Broadband CRM | Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static/font/lucide.css">
    <!-- Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/styles.css?v=2.0">
</head>

<body data-theme="light">
    <!-- Login Overlay -->
    <div id="login-overlay" class="login-overlay login-hidden">
        <div class="glass-card login-card">
            <i class="lucide-wifi" style="font-size: 48px; color: var(--acn-orange); margin-bottom: 20px;"></i>
            <h2 style="margin-bottom: 8px;">ACN Broadband CRM</h2>
            <p style="color: var(--text-secondary); margin-bottom: 30px;">Professional ISP Management System</p>

            <form id="login-form" style="text-align: left;">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.875rem;">Email Address</label>
                    <input type="email" id="admin-id" placeholder="Enter email address" required
                        style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.4);">
                </div>
                <div style="margin-bottom: 30px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.875rem;">Password</label>
                    <input type="password" id="admin-password" placeholder="Enter password" required
                        style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.4);">
                </div>
                <button type="submit" class="glass-button primary"
                    style="width: 100%; padding: 14px; font-size: 1rem;">Access Dashboard</button>
                <p style="text-align: center; margin-top: 16px; font-size: 0.75rem; color: var(--text-secondary);">
                    <a href="#" id="forgot-password-link" style="color: var(--acn-blue); font-weight: 600;">Forgot Password?</a>
                </p>
            </form>
        </div>
    </div>

    <div class="app-container">
        <!-- Toast Notifications -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Modal Overlay -->
        <div id="modal-overlay" class="modal-overlay">
            <div id="modal-content" class="modal-content glass-card" style="padding: 32px;"></div>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <i class="lucide-wifi" style="color: var(--acn-orange); font-size: 24px;"></i>
                <h2>ACN Broadband</h2>
            </div>

            <nav class="nav-menu">
                <div class="nav-item">
                    <a href="#" class="nav-link active" data-section="dashboard">
                        <i class="lucide-layout-dashboard"></i>
                        <span>Dashboard</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link" data-section="add-customer">
                        <i class="lucide-user-plus"></i>
                        <span>Add Customer</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link" data-section="all-customers">
                        <i class="lucide-users"></i>
                        <span>All Customers</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link unpaid" data-section="unpaid-recharges">
                        <i class="lucide-wallet"></i>
                        <span>Unpaid Recharges</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link" data-section="expiring-today">
                        <i class="lucide-alert-circle"></i>
                        <span>Expiring Today</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link" data-section="expiring-tomorrow">
                        <i class="lucide-bell"></i>
                        <span>Expiring Tomorrow</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link" data-section="expired-yesterday">
                        <i class="lucide-calendar-x"></i>
                        <span>Expired Yesterday</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link" data-section="expiring-soon">
                        <i class="lucide-clock"></i>
                        <span>Expiring Soon (7d)</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link" data-section="payments">
                        <i class="lucide-credit-card"></i>
                        <span>Payments</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link" data-section="plans">
                        <i class="lucide-layers"></i>
                        <span>Plans</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link" data-section="reports">
                        <i class="lucide-bar-chart-3"></i>
                        <span>Reports</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link" data-section="staff">
                        <i class="lucide-shield-check"></i>
                        <span>Staff Management</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link" data-section="settings">
                        <i class="lucide-settings"></i>
                        <span>Settings</span>
                    </a>
                </div>
            </nav>

            <div class="nav-item" style="margin-top: auto;">
                <a href="#" class="nav-link" data-section="logout" style="color: #ef4444;">
                    <i class="lucide-log-out"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content Wrapper -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <button id="sidebar-toggle" class="glass-button icon-btn"
                        style="display: none; border: none; background: transparent;">
                        <i class="lucide-menu" style="font-size: 24px; color: var(--acn-blue);"></i>
                    </button>
                    <div class="search-bar">
                        <i class="lucide-search"
                            style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"></i>
                        <input type="text" placeholder="Search customers..." onkeyup="filterTable(this.value)">
                    </div>
                </div>

                <div class="header-actions">
                    <button id="theme-toggle" class="glass-button" style="padding: 8px;">
                        <i class="lucide-sun"></i>
                    </button>
                    <div class="profile-section">
                        <div class="avatar">AD</div>
                        <div class="user-info">
                            <p style="font-weight: 600; font-size: 0.875rem;">Admin User</p>
                            <p style="font-size: 0.75rem; color: var(--text-secondary);">Super Admin</p>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Dynamic Section Container -->
            <div id="content-area">
                <!-- Content will be injected here by app.js -->
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <!-- Core Logic -->
    <script type="module" src="assets/js/firebase-config.js?v=2.1"></script>
    <script type="module" src="assets/js/app.js?v=2.1"></script>
    <script type="module" src="assets/js/dashboard.js?v=2.1"></script>
    <script type="module" src="assets/js/customers.js?v=2.1"></script>
    <script type="module" src="assets/js/management.js?v=2.1"></script>
</body>

</html>
